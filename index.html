<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ঈদ সালামি Premium Viral</title>

<link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
    font-family:'Anek Bangla',sans-serif;
    margin:0;
    padding:0;
    background:url('https://i.postimg.cc/ZCYSdZcx/image.jpg') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}
body::before{
    content:'';
    position:fixed;top:0;left:0;width:100%;height:100%;
    background: rgba(0,0,0,0.55); z-index:-1;
}

.card{
    width:90%; max-width:450px; padding:25px;
    background: rgba(0,0,0,0.5);
    border-radius:20px;
    backdrop-filter: blur(12px);
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.7);
    position:relative;
    overflow:hidden;
}

.title{
    font-size:36px;
    color:#FFD700;
    font-weight:800;
    text-shadow:0 0 20px #fff, 0 0 30px #FFD700;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:12px;
    border:none;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    background:#FFD700;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}
button:hover{opacity:0.9;}

.output-card{
    display:none;
    background: rgba(0,0,0,0.6);
    border-radius:20px;
    padding:20px;
    margin-top:15px;
    text-align:left;
    font-size:18px;
    position:relative;
}
.output-card::after{
    content:'✨'; position:absolute; top:5px; right:10px; font-size:24px;
    animation: sparkle 1.2s infinite alternate;
}
@keyframes sparkle{
    0%{opacity:0.2; transform:scale(1);}
    50%{opacity:1; transform:scale(1.2);}
    100%{opacity:0.2; transform:scale(1);}
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

<div class="title">ঈদ মোবারক 🌙</div>

<input type="text" id="sender" placeholder="আপনার নাম">
<input type="text" id="receiver" placeholder="কার কাছে পাঠাবেন (ঐচ্ছিক)">
<input type="text" id="number" placeholder="মোবাইল নাম্বার">

<select id="payment">
<option value="">Payment Method</option>
<option value="Bkash">Bkash</option>
<option value="Nagad">Nagad</option>
<option value="Rocket">Rocket</option>
<option value="Upay">Upay</option>
</select>

<button id="generateBtn">Generate Salam 🚀</button>

<div class="output-card" id="result"></div>

<button class="hidden" id="callBtn" onclick="callNow()">📞 Call</button>
<button class="hidden" id="shareBtn" onclick="shareLink()">🔗 Share</button>
<button class="hidden" id="copyBtn" onclick="copyLink()">📋 Copy</button>

</div>

<script>
// confetti 🎉
function fireConfetti(){
    confetti({
        particleCount: 100,
        spread: 70,
        origin: {y:0.6},
        colors:['#FFD700','#ffffff','#ff6347','#00ffff']
    });
}

// validation
function isNumberValid(num){return /^[0-9]{11}$/.test(num);}

// viral share lock
let shareCount=0;
function checkShareLock(){
    if(shareCount<3){
        alert("🔒 প্রথমে ৩ বার বন্ধুদের সাথে শেয়ার করুন!");
        return false;
    }
    return true;
}

const generateBtn = document.getElementById("generateBtn");
const resultDiv = document.getElementById("result");
const callBtn = document.getElementById("callBtn");
const shareBtn = document.getElementById("shareBtn");
const copyBtn = document.getElementById("copyBtn");

generateBtn.onclick = ()=>{
    const sender=document.getElementById("sender").value.trim();
    const receiver=document.getElementById("receiver").value.trim();
    const number=document.getElementById("number").value.trim();
    const payment=document.getElementById("payment").value;

    if(!sender || !number || !payment){alert("সব তথ্য পূরণ করুন!"); return;}
    if(!isNumberValid(number)){alert("সঠিক ১১ সংখ্যার নাম্বার দিন!"); return;}
    if(!checkShareLock()) return;

    let text=`ঈদ মোবারক 🌙\n`;
    if(receiver) text+=`${receiver} কে\n`;
    text+=`শুভেচ্ছান্তে: ${sender}\nPayment: ${payment}\nNumber: ${number}`;

    resultDiv.innerText=text;
    resultDiv.style.display="block";
    callBtn.classList.remove("hidden");
    shareBtn.classList.remove("hidden");
    copyBtn.classList.remove("hidden");

    fireConfetti();
};

// Call function
function callNow(){
    const number=document.getElementById("number").value.trim();
    if(number) window.location.href="tel:"+number;
}

// Copy function
function copyLink(){
    navigator.clipboard.writeText(resultDiv.innerText);
    alert("Copied!");
}

// Share function
function shareLink(){
    let text=resultDiv.innerText;
    if(navigator.share){navigator.share({text:text});}
    else{alert("Share supported না।");}
    shareCount++;
}
</script>

</body>
</html>
