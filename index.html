<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ঈদ মোবারক - সালামী কালেকশন</title>
    <!-- সুন্দর ফন্টের জন্য Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- ম্যাজিক কনফেটি ইফেক্টের জন্য স্ক্রিপ্ট -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            background: radial-gradient(circle at center, #1a2238 0%, #090a0f 100%);
            color: #ffffff;
            font-family: 'Anek Bangla', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* প্রিমিয়াম গ্লাস ইফেক্ট কন্টেইনার */
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            max-width: 450px;
            width: 90%;
            margin: 20px auto;
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.4);
            position: relative;
            z-index: 10;
        }
        /* সুন্দর গোল্ডেন GIF */
        img.eid-gif {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.5);
            background-color: #0b1021; /* লোড হওয়ার সময় সুন্দর দেখাবে */
        }
        /* টেক্সট স্টাইলিং */
        .salam-text {
            color: #fce883;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .eid-text {
            color: #d4af37;
            font-size: 36px;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }
        .sender-name {
            font-size: 28px;
            color: #00ffcc;
            font-weight: 800;
            margin: 10px 0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .salami-msg {
            background: rgba(212, 175, 55, 0.15);
            padding: 10px;
            border-radius: 10px;
            font-size: 18px;
            color: #ffffff;
            margin: 15px 0;
            border: 1px dashed #d4af37;
        }
        /* সালামী বক্স স্টাইলিং */
        .salami-box {
            background: linear-gradient(145deg, #111827, #1f2937);
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border-left: 4px solid #00ffcc;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .salami-method {
            font-size: 18px;
            color: #a78bfa;
            font-weight: 600;
            margin: 0 0 5px 0;
        }
        .salami-number {
            font-size: 32px;
            font-weight: 800;
            color: #00ffcc;
            letter-spacing: 3px;
            margin: 0;
        }
        /* ফর্ম এবং বাটন স্টাইলিং */
        input, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            font-family: 'Anek Bangla', sans-serif;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #d4af37;
            background: rgba(0,0,0,0.5);
        }
        button {
            background: linear-gradient(135deg, #d4af37 0%, #f9a826 100%);
            color: #111;
            font-size: 18px;
            font-weight: 800;
            padding: 14px 20px;
            width: 100%;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            font-family: 'Anek Bangla', sans-serif;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        .hidden {
            display: none !important;
        }
        textarea {
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.5);
            color: #00ffcc;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #00ffcc;
            resize: none;
            box-sizing: border-box;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ১০০% কাজ করবে এমন প্রিমিয়াম ঈদ মোবারক GIF -->
        <img src="https://media.giphy.com/media/Lqi5HhmZOWvcZXpdCb/giphy.gif" 
             onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1590401865449-d1bd1e6f3d13?w=500&q=80';" 
             alt="Eid Mubarak GIF" class="eid-gif">
        
        <!-- যাকে পাঠানো হবে সে এই অংশটি দেখবে -->
        <div id="greetingView" class="hidden">
            <div class="salam-text">আসসালামুয়ালাইকুম 🙏</div>
            <h1 class="eid-text">ঈদ মোবারক! 🌙</h1>
            
            <p style="margin: 10px 0 0 0; color: #ccc;">আপনাকে শুভেচ্ছা জানিয়েছেন:</p>
            <div class="sender-name" id="displaySenderName"></div>
            
            <div class="salami-msg">
                এই ঈদ উপলক্ষে আমাকে সালামি পাঠান! 💸🥰
            </div>
            
            <div class="salami-box" id="salamiBox">
                <p class="salami-method" id="salamiMethod"></p>
                <p class="salami-number" id="salamiNumber"></p>
            </div>
            
            <hr style="border:0; border-top:1px solid rgba(212, 175, 55, 0.3); margin:25px 0;">
            <p style="font-size: 14px; color: #aaa;">আপনিও কি বন্ধুদের কাছে সালামী চাইতে চান?</p>
            <button class="btn-secondary" onclick="showForm()">নিজের নামে কার্ড তৈরি করুন</button>
        </div>

        <!-- কার্ড তৈরি করার ফর্ম (প্রথমে এটি দেখাবে) -->
        <div id="formView">
            <h1 class="eid-text" style="font-size: 28px;">ঈদ মোবারক! 🌙</h1>
            <p style="color:#ddd; font-size:16px; margin-bottom: 20px;">বন্ধুদের কাছে সালামীর আবদার পাঠাতে নিজের নামে ডিজিটাল কার্ড তৈরি করুন</p>
            
            <input type="text" id="nameInput" placeholder="আপনার নাম লিখুন (যেমন: সাকিব)" required>
            
            <select id="methodInput">
                <option value="বিকাশ (bKash)">বিকাশ (bKash)</option>
                <option value="নগদ (Nagad)">নগদ (Nagad)</option>
                <option value="রকেট (Rocket)">রকেট (Rocket)</option>
                <option value="উপায় (Upay)">উপায় (Upay)</option>
            </select>
            
            <input type="number" id="numberInput" placeholder="আপনার মোবাইল ব্যাংকিং নাম্বার" required>
            
            <button onclick="generateLink()">কার্ডের লিংক তৈরি করুন 🚀</button>
            
            <div id="shareSection" class="hidden">
                <p style="color:#00ffcc; margin-top:20px; font-weight:bold;">🎉 আপনার লিংক তৈরি হয়েছে!</p>
                <textarea id="generatedLink" readonly></textarea>
                
                <button onclick="copyLink()" style="background: #00ffcc; color: #111;">লিংক কপি করুন 📋</button>
                <button class="btn-secondary" onclick="openLink()">লিংকটি ওপেন করে দেখুন 👁️</button>
            </div>
        </div>
    </div>

    <script>
        // URL থেকে ডেটা সংগ্রহ করা
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const method = urlParams.get('method');
        const number = urlParams.get('number');

        // যদি URL-এ নাম থাকে, তাহলে সালামী কার্ডটি দেখাবে
        if (name) {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('greetingView').classList.remove('hidden');
            
            document.getElementById('displaySenderName').innerText = name;
            
            if (method && number) {
                document.getElementById('salamiMethod').innerText = "পেমেন্ট মাধ্যম: " + method;
                document.getElementById('salamiNumber').innerText = number;
            } else {
                document.getElementById('salamiBox').classList.add('hidden');
            }

            // ম্যাজিক কনফেটি (কাগজের টুকরো ওড়ার ইফেক্ট)
            setTimeout(() => {
                var duration = 3 * 1000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors:['#d4af37', '#fce883', '#00ffcc', '#ffffff']
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors:['#d4af37', '#fce883', '#00ffcc', '#ffffff']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }, 500);
        }

        // নিজের নামে কার্ড তৈরি করার অপশন
        function showForm() {
            window.history.pushState({}, document.title, window.location.pathname);
            document.getElementById('greetingView').classList.add('hidden');
            document.getElementById('formView').classList.remove('hidden');
        }

        // নিখুঁতভাবে লিংক তৈরি করা
        function generateLink() {
            const n = document.getElementById('nameInput').value.trim();
            const m = document.getElementById('methodInput').value;
            const num = document.getElementById('numberInput').value.trim();
            
            if(!n || !num) { 
                alert('অনুগ্রহ করে আপনার নাম এবং মোবাইল নাম্বার সঠিকভাবে লিখুন!'); 
                return; 
            }

            const baseUrl = window.location.href.split('?')[0];
            const link = baseUrl + 
                         '?name=' + encodeURIComponent(n) + 
                         '&method=' + encodeURIComponent(m) + 
                         '&number=' + encodeURIComponent(num);
            
            document.getElementById('generatedLink').value = link;
            document.getElementById('shareSection').classList.remove('hidden');
        }

        // লিংক কপি করার ফাংশন
        function copyLink() {
            const copyText = document.getElementById('generatedLink');
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            try {
                navigator.clipboard.writeText(copyText.value).then(() => {
                    alert('✅ লিংকটি কপি করা হয়েছে! এখন মেসেঞ্জার বা হোয়াটসঅ্যাপে বন্ধুদের পাঠিয়ে দিন।');
                });
            } catch (err) {
                document.execCommand('copy');
                alert('✅ লিংকটি কপি করা হয়েছে!');
            }
        }

        // লিংকটি নতুন ট্যাবে ওপেন করে দেখার ফাংশন
        function openLink() {
            const link = document.getElementById('generatedLink').value;
            window.open(link, '_blank');
        }
    </script>
</body>
</html>
