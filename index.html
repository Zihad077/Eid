<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#061a10">
    <title>ঈদ মোবারক - সালামী কালেকশন</title>
    <!-- প্রিমিয়াম ফন্ট -->
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* বেসিক রিসেট ও স্ক্রল বন্ধ করা (এক স্ক্রিনে ফিট) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #061a10; /* গাঢ় সবুজ ব্যাকগ্রাউন্ড */
            color: #ffffff;
            font-family: 'Anek Bangla', sans-serif;
            /* স্ক্রল বন্ধ করার জন্য */
            overflow: hidden; 
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* কার্ডের মূল কন্টেইনার (বর্ডার ও ডিজাইন) */
        .card-wrapper {
            width: 100%;
            max-width: 450px;
            height: 100dvh;
            background: radial-gradient(circle at top center, #0a2d1c 0%, #04120b 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* সোনালী বর্ডার ফ্রেম */
        .gold-border-frame {
            width: 100%;
            height: calc(100% - 80px); /* নিচে বাটনের জন্য জায়গা রাখা হয়েছে */
            margin-bottom: 70px;
            border: 2px solid #d4af37;
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 2vh 15px;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.1);
        }

        /* ফ্রেমের কোণার ডিজাইন (CSS দিয়ে) */
        .gold-border-frame::before, .gold-border-frame::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #d4af37;
            border-radius: 50%;
        }
        .gold-border-frame::before { top: -10px; left: -10px; background: #061a10; }
        .gold-border-frame::after { bottom: -10px; right: -10px; background: #061a10; }

        /* টপ ডেকোরেশন (চাঁদ ও তারা) */
        .top-decor {
            font-size: 6vh;
            color: #fce883;
            text-shadow: 0 0 20px rgba(252, 232, 131, 0.6);
            line-height: 1;
            margin-top: -1vh;
        }

        /* টেক্সট স্টাইলিং (ছবির মতো) */
        .eid-title {
            font-size: 5.5vh;
            font-weight: 800;
            color: #d4af37; /* সোনালী কালার */
            text-shadow: 2px 2px 0px #000, 0 0 15px rgba(212, 175, 55, 0.5);
            margin: 0;
            line-height: 1.1;
        }
        
        .salam-text {
            font-size: 3vh;
            font-weight: 600;
            color: #ffffff;
            margin: 1vh 0;
        }

        .sender-label {
            font-size: 2.5vh;
            color: #d4af37;
            font-weight: 600;
            margin-top: 1vh;
        }

        /* আপনার নাম (বড় সোনালী অক্ষরে) */
        .sender-name {
            font-size: 4.5vh;
            font-weight: 800;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin: 0;
            padding: 0 10px;
            line-height: 1.2;
            text-align: center;
        }

        .message-text {
            font-size: 2.4vh;
            color: #e2e8f0;
            font-weight: 600;
            text-align: center;
            line-height: 1.5;
            margin: 1vh 0;
        }

        /* পেমেন্ট সেকশন */
        .payment-label {
            font-size: 2.2vh;
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .payment-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 2vh;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5vh;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* নাম্বার বক্স (সাদা ব্যাকগ্রাউন্ড, সবুজ লেখা) */
        .number-box {
            background-color: #ffffff;
            color: #061a10;
            font-size: 4.5vh;
            font-weight: 800;
            padding: 1vh 4vh;
            border-radius: 12px;
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.4);
            border: 2px solid #d4af37;
            margin-bottom: 2vh;
        }

        /* সবার নিচের ফিক্সড বাটন */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            padding: 15px 20px;
            background: rgba(6, 26, 16, 0.9);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .btn-create {
            background: linear-gradient(to right, #d4af37, #fcf6ba, #d4af37);
            color: #061a10;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 2.2vh;
            font-weight: 800;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-create:active { transform: scale(0.96); }

        /* বটম শিট ফর্ম (আগের মতোই সুন্দর) */
        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            z-index: 99; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 450px; background: #0a2d1c;
            border-radius: 28px 28px 0 0; padding: 25px 20px 40px;
            z-index: 100; border-top: 2px solid #d4af37;
            transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .bottom-sheet.active { bottom: 0; }
        .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }
        
        .drag-handle { width: 40px; height: 5px; background: #d4af37; border-radius: 10px; margin: 0 auto 20px; }
        
        .input-field {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.4);
            color: #fff; padding: 14px 18px; border-radius: 12px; font-size: 16px; font-family: inherit;
            outline: none; margin-bottom: 15px; box-sizing: border-box;
        }
        .input-field:focus { border-color: #d4af37; background: rgba(212, 175, 55, 0.1); }
        
        .result-box { display: none; margin-top: 15px; text-align: center; }
        .link-textarea {
            width: 100%; height: 80px; background: #04120b; border: 1px dashed #d4af37;
            color: #d4af37; padding: 12px; border-radius: 12px; resize: none; margin-bottom: 15px; box-sizing: border-box;
        }
        .btn-action {
            background: #d4af37; color: #061a10; width: 100%; padding: 12px; border: none;
            border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="card-wrapper">
        
        <!-- সোনালী বর্ডার ও ডিজাইন করা ফ্রেম -->
        <div class="gold-border-frame">
            
            <!-- টপ ডেকোরেশন -->
            <div class="top-decor">✨ 🌙 ✨</div>

            <!-- মূল টেক্সট -->
            <h1 class="eid-title">ঈদ মোবারক!</h1>
            <p class="salam-text">আসসালামু আলাইকুম 🤲</p>
            
            <p class="sender-label">শুভেচ্ছান্তে:</p>
            <h2 class="sender-name" id="displaySenderName">[আপনার নাম]</h2>

            <p class="message-text">এই ঈদ উপলক্ষে আমাকে<br>সালামি পাঠান এবং ঈদের আনন্দ<br>ভাগ করে নিন! 💸🥰</p>

            <!-- পেমেন্ট ইনফরমেশন -->
            <div style="text-align: center; width: 100%;">
                <p class="payment-label">পেমেন্ট মাধ্যম</p>
                <div class="payment-badge" id="displayMethod" style="background: #e2136e;">বিকাশ (bKash)</div>
                <div class="number-box" id="displayNumber">01XXXXXXXXX</div>
            </div>

        </div>

        <!-- এক স্ক্রিনে দেখার জন্য সবার নিচে ফিক্সড বাটন -->
        <div class="fixed-bottom-bar">
            <button class="btn-create" onclick="openBottomSheet()">নিজের জন্য তৈরি করুন</button>
        </div>

    </div>

    <!-- বটম শিট (কার্ড তৈরি করার ফর্ম) -->
    <div class="bottom-sheet-overlay" id="sheetOverlay" onclick="closeBottomSheet()"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="drag-handle"></div>
        <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">কার্ড তৈরি করুন</h2>
        
        <div id="formSection">
            <input type="text" id="nameInput" class="input-field" placeholder="আপনার নাম লিখুন" required>
            
            <select id="methodInput" class="input-field">
                <option value="bKash">বিকাশ (bKash)</option>
                <option value="Nagad">নগদ (Nagad)</option>
                <option value="Rocket">রকেট (Rocket)</option>
                <option value="Upay">উপায় (Upay)</option>
            </select>
            
            <input type="number" id="numberInput" class="input-field" placeholder="আপনার মোবাইল ব্যাংকিং নাম্বার" required>
            
            <button class="btn-action" onclick="generateLink()" style="background: #10b981; color:#fff;">লিংক তৈরি করুন 🚀</button>
        </div>

        <div id="resultSection" class="result-box">
            <p style="color: #10b981; font-weight: 600; margin-bottom: 10px;">🎉 আপনার লিংক তৈরি হয়েছে!</p>
            <textarea id="generatedLink" class="link-textarea" readonly></textarea>
            
            <button class="btn-action" onclick="copyLink()">লিংক কপি করুন 📋</button>
            <button class="btn-action" style="background: transparent; border: 1px solid #d4af37; color: #d4af37;" onclick="openLink()">ওপেন করে দেখুন 👁️</button>
        </div>
    </div>

    <script>
        // URL থেকে ডেটা সংগ্রহ
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const method = urlParams.get('method');
        const number = urlParams.get('number');

        // পেমেন্ট মাধ্যম অনুযায়ী কালার ব্যাজ সেট করা
        function setBadge(methodName) {
            const badge = document.getElementById('displayMethod');
            if(methodName === 'bKash') {
                badge.style.background = '#e2136e'; badge.innerText = 'বিকাশ (bKash)';
            } else if(methodName === 'Nagad') {
                badge.style.background = 'linear-gradient(to right, #ed1c24, #f7931e)'; badge.innerText = 'নগদ (Nagad)';
            } else if(methodName === 'Rocket') {
                badge.style.background = '#8c1590'; badge.innerText = 'রকেট (Rocket)';
            } else if(methodName === 'Upay') {
                badge.style.background = '#0067b2'; badge.innerText = 'উপায় (Upay)';
            } else {
                badge.style.background = '#d4af37'; badge.innerText = methodName;
            }
        }

        // যদি URL-এ ডেটা থাকে, তবে নাম ও নাম্বার আপডেট হবে
        if (name && number) {
            document.getElementById('displaySenderName').innerText = name;
            document.getElementById('displayNumber').innerText = number;
            if (method) setBadge(method);

            // কনফেটি ফায়ারওয়ার্ক
            setTimeout(() => {
                confetti({ particleCount: 50, spread: 70, origin: { y: 0.6 }, colors:['#d4af37', '#fce883', '#ffffff'] });
            }, 500);
        }

        // ফর্ম স্লাইড-আপ কন্ট্রোল
        function openBottomSheet() {
            document.getElementById('sheetOverlay').classList.add('active');
            document.getElementById('bottomSheet').classList.add('active');
        }
        function closeBottomSheet() {
            document.getElementById('sheetOverlay').classList.remove('active');
            document.getElementById('bottomSheet').classList.remove('active');
        }

        // লিংক জেনারেট
        function generateLink() {
            const n = document.getElementById('nameInput').value.trim();
            const m = document.getElementById('methodInput').value;
            const num = document.getElementById('numberInput').value.trim();
            
            if(!n || !num) { alert('আপনার নাম এবং নাম্বার দিন!'); return; }

            const baseUrl = window.location.href.split('?')[0];
            const link = baseUrl + '?name=' + encodeURIComponent(n) + '&method=' + encodeURIComponent(m) + '&number=' + encodeURIComponent(num);
            
            document.getElementById('generatedLink').value = link;
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
        }

        // লিংক কপি
        function copyLink() {
            const copyText = document.getElementById('generatedLink');
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            try {
                navigator.clipboard.writeText(copyText.value).then(() => { alert('✅ লিংক কপি হয়েছে!'); });
            } catch (err) {
                document.execCommand('copy'); alert('✅ লিংক কপি হয়েছে!');
            }
        }

        function openLink() {
            window.location.href = document.getElementById('generatedLink').value;
        }
    </script>
</body>
</html>
